body:
  text: 化清經濁者不信淵之清而甘濯其濁矣馬總意林卷五動則虎發靜如鱗潛若彼赫赫若此洋洋同上將飛者翼伏將奮者足局將噬者爪縮將言者口默將文者且朴同上貨者化也變化反易之物故字有化也水戰之鴨何必白纓盈俎之雞何必長鳴太平御覽卷九百十九望視之兔白蹄之豕短啄之犬修頭之馬斯禽獸也猶形乎勢觀況君子之貌獨無表告者哉徐堅初學記卷二十九引作蔡氏清論經云寶者衆之所利也苟利其利害必存焉太平御覽卷八百二引蔡氏化清論伏龍非我馬白日非我燭藏之默默保此小朴太平御覽卷八百七十引蔡氏化清論鏡能明人好醜而不能好醜乎人北堂書鈔卷一百三十六引蔡氏清化論按清化二字誤倒
